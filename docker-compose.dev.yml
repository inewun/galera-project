services:
  galera-gantt-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: galera-gantt-dev:latest
    container_name: galera-gantt-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "127.0.0.1:4010:4000"
    volumes:
      - ./data-dev:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"PORT\", \"4000\")}/api/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
